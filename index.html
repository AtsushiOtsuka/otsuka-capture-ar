<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="マーカーの上を跳ね回る「おーつか」をタップで捕まえるWebAR捕獲ゲーム"
    />
    <title>おーつかをつかまえろ！ WebAR捕獲ゲーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app" class="app-shell">
      <section id="start-screen" class="start-screen" aria-labelledby="app-title">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-orbit brand-orbit-a"></span>
          <span class="brand-orbit brand-orbit-b"></span>
          <span class="brand-core"></span>
        </div>
        <p class="eyebrow">マーカー型WebAR ミニゲーム</p>
        <h1 id="app-title">おーつかを<br />つかまえろ！</h1>
        <p class="lead">
          カメラをマーカーに向けると、白衣の「おーつか」が飛び出して逃げ回ります。
          タップして制限時間内にできるだけたくさん捕まえよう！
        </p>
        <button id="start-button" class="primary-button" type="button">
          <span aria-hidden="true">▶</span>
          ゲームスタート
        </button>
        <p class="start-note">カメラはボタンを押した後にのみ起動します。</p>
        <p class="version-note">v1.3 — コンボ＆お手つき</p>
      </section>

      <section id="fallback" class="fallback-panel" hidden aria-live="assertive">
        <h2 id="fallback-title">ARを開始できません</h2>
        <p id="fallback-message"></p>
      </section>

      <div id="ar-container" class="ar-container" aria-label="ARカメラ表示"></div>

      <section id="runtime-ui" class="runtime-ui" hidden aria-label="ゲーム操作">
        <header class="top-bar">
          <div class="hud-block">
            <p class="status-label">スコア</p>
            <p id="score-value" class="hud-value">0</p>
          </div>
          <div class="hud-block">
            <p class="status-label">のこり</p>
            <p class="hud-value"><span id="time-value">30</span><span class="hud-unit">秒</span></p>
          </div>
          <div class="hud-block">
            <p class="status-label">マーカー</p>
            <p id="tracking-status" class="tracking-status">未検出</p>
          </div>
          <button id="stop-button" class="ghost-button" type="button">終了</button>
        </header>

        <p id="tracking-hint" class="tracking-hint">マーカーにカメラを向けてください</p>

        <p id="gold-banner" class="gold-banner" hidden aria-live="polite">✨ ゴールデンおーつか！ +3点 ✨</p>
        <p id="penalty-flash" class="penalty-flash" hidden aria-live="polite">にせもの！ −1</p>
        <p id="combo-flash" class="combo-flash" hidden aria-live="polite"></p>
        <p id="miss-flash" class="miss-flash" hidden aria-live="polite">ミス…</p>

        <section id="result" class="result-panel" hidden aria-live="polite">
          <div class="result-card">
            <p class="result-kicker">タイムアップ！</p>
            <p class="result-score-row">
              <span id="result-score" class="result-score">0</span>
              <span class="result-unit">匹 つかまえた</span>
            </p>
            <p id="result-comment" class="result-comment"></p>
            <div class="result-actions">
              <button id="retry-button" class="primary-button" type="button">もう一度</button>
              <button id="end-button" class="ghost-button" type="button">終了する</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <noscript>
      <p class="noscript-message">このゲームを遊ぶにはJavaScriptを有効にしてください。</p>
    </noscript>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1000px; height: 1000px; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
    background: #ffffff;
  }
  .card {
    position: relative;
    width: 1000px;
    height: 1000px;
    background: #fdfaf2;
    overflow: hidden;
    border: 18px solid #1d2a3a;
  }
  /* 非対称コーナー（向き判定の特徴点） */
  .corner {
    position: absolute;
    width: 120px;
    height: 120px;
  }
  .corner.tl { top: 30px; left: 30px; background: #e94f37; clip-path: polygon(0 0, 100% 0, 0 100%); }
  .corner.tr { top: 30px; right: 30px; background: #1b998b; border-radius: 50%; width: 100px; height: 100px; }
  .corner.bl { bottom: 30px; left: 30px; background: #f4b942; clip-path: polygon(50% 0, 100% 100%, 0 100%); }
  .corner.br { bottom: 30px; right: 30px; background: #3066be; clip-path: polygon(0 0, 100% 0, 100% 100%); width: 90px; height: 130px; }

  .title {
    position: absolute;
    top: 52px;
    left: 0; right: 0;
    text-align: center;
    font-size: 74px;
    font-weight: 900;
    color: #1d2a3a;
    letter-spacing: 2px;
  }
  .title .accent { color: #e94f37; }
  .subtitle {
    position: absolute;
    top: 150px;
    left: 0; right: 0;
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    color: #1b998b;
    letter-spacing: 6px;
  }

  .char-frame {
    position: absolute;
    top: 230px;
    left: 235px;
    width: 530px;
    height: 560px;
    border-radius: 36px;
    overflow: hidden;
    border: 12px solid #1d2a3a;
    box-shadow: 18px 18px 0 #f4b942;
  }
  .char-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 周辺の特徴点散布（非反復・非対称） */
  .deco { position: absolute; font-weight: 900; }
  .flask { left: 70px; top: 300px; font-size: 90px; }
  .atom { right: 60px; top: 350px; font-size: 84px; }
  .paw1 { left: 95px; top: 480px; font-size: 64px; transform: rotate(-20deg); }
  .paw2 { right: 105px; top: 540px; font-size: 56px; transform: rotate(25deg); }
  .star1 { left: 60px; top: 640px; font-size: 70px; transform: rotate(15deg); }
  .bolt { right: 70px; top: 690px; font-size: 76px; transform: rotate(-10deg); }
  .net { left: 90px; top: 770px; font-size: 78px; transform: rotate(30deg); }
  .sparkle { right: 150px; top: 230px; font-size: 52px; }

  .stripe {
    position: absolute;
    bottom: 175px;
    left: 0;
    width: 100%;
    height: 16px;
    background: repeating-linear-gradient(
      90deg,
      #1d2a3a 0 70px,
      #e94f37 70px 130px,
      #fdfaf2 130px 180px,
      #1b998b 180px 260px,
      #f4b942 260px 300px
    );
  }
  .footer {
    position: absolute;
    bottom: 88px;
    left: 0; right: 0;
    text-align: center;
    font-size: 30px;
    font-weight: 800;
    color: #1d2a3a;
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .footer span { color: #3066be; }
</style>
</head>
<body>
  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <h1 class="title">おーつかを<span class="accent">つかまえろ！</span></h1>
    <p class="subtitle">WEBAR CAPTURE GAME</p>

    <div class="char-frame">
      <img src="./_char_front.png" alt="おーつか" />
    </div>

    <div class="deco flask">🧪</div>
    <div class="deco atom">⚛️</div>
    <div class="deco paw1">🐾</div>
    <div class="deco paw2">🐾</div>
    <div class="deco star1">✨</div>
    <div class="deco bolt">⚡</div>
    <div class="deco net">🥅</div>
    <div class="deco sparkle">💫</div>

    <div class="stripe"></div>
    <p class="footer">カメラをこのマーカーに向けてね <span>▶ OTSUKA LAB</span></p>
  </div>
</body>
</html>
